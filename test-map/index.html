<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>GTA 5 Map with Coords Input</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f0f0f;
            font-family: 'Chalet', Arial, sans-serif;
        }

        .maps_wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
            user-select: none;
            overflow: hidden;
        }

        .maps_container {
            position: absolute;
            will-change: transform;
            transition: transform 0s cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        .maps_scaler {
            position: relative;
            transform-origin: 0 0;
        }

        .maps_image {
            background-color: #1a1a1a;
            background-image: url('map8k.jpg');
            background-size: contain;
        }

        /* Маркер цели */
        .target_marker {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #ff3c3c;
            border: 3px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        /* Координаты под мышкой */
        #mouse_coords {
            position: fixed;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 1000;
            white-space: nowrap;
            border: 1px solid #333;
            display: none;
        }

        /* Панель ввода (GTA RP Style) */
        .input_panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            border-left: 4px solid #fbc02d;
            color: white;
            border-radius: 4px;
            z-index: 1001;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .input_group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .input_group label {
            font-size: 12px;
            color: #aaa;
            width: 15px;
        }

        input {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 5px;
            width: 80px;
            outline: none;
            border-radius: 2px;
        }

        input:focus {
            border-color: #fbc02d;
        }

        button {
            background: #fbc02d;
            border: none;
            color: black;
            padding: 6px 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 2px;
            width: 100%;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover {
            background: #fff;
        }

        svg {
            position: absolute;
            border: 2px solid #444;
            /* Y в GTA растет вверх, в SVG вниз. Инвертируем отображение контейнера для удобства */
            transform: scaleY(-1); 
        }
        .zone-rect {
            fill: rgba(0, 255, 255, 0.3);
            stroke: cyan;
            stroke-width: 5;
            vector-effect: non-scaling-stroke; /* Чтобы линии не толстели при зуме */
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="mouse_coords">X: 0 Y: 0</div>

    <div class="input_panel">
        <div style="font-size: 14px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase;">Навигация</div>
        <div class="input_group">
            <label>X</label><input type="number" id="in_x" placeholder="0.0">
            <label>Y</label><input type="number" id="in_y" placeholder="0.0">
        </div>
        <button onclick="goToInputCoords()">Перейти</button>
    </div>

    <div id="maps_wrapper" class="maps_wrapper">
        <div class="maps_viewport">
            <div id="maps_container" class="maps_container">
                <div id="maps_scaler" class="maps_scaler">
    <div id="maps_image" class="maps_image"></div>
    
    <!-- SVG теперь живет здесь -->
    <svg id="gta-zones" 
         style="position: absolute; left: 0; top: 0; overflow: visible; pointer-events: none;" 
         width="8192" height="8192">
        <g id="zones-layer"></g>
    </svg>

    <div id="target_marker" class="target_marker" style="display: none;"></div>
</div>
            </div>
        </div>
    </div>

    <script>
        
        const baseSize = 8192, worldToPixelConst = 1.51821820693, offsetX = 3756, offsetY = 5528;
        let zoom = 0.2, currentX = 0, currentY = 0, elementSize = { width: 0, height: 0 };

        const wrapper = document.getElementById('maps_wrapper'), container = document.getElementById('maps_container');
        const scaler = document.getElementById('maps_scaler'), img = document.getElementById('maps_image');
        const marker = document.getElementById('target_marker'), mouseInfo = document.getElementById('mouse_coords');

        img.style.width = img.style.height = baseSize + 'px';

        function updateSize() {
            elementSize.width = window.innerWidth;
            elementSize.height = window.innerHeight;
            updateMap();
        }

        function updateMap(smooth = false) {
            container.style.transition = smooth ? "transform 0.8s cubic-bezier(0.215, 0.61, 0.355, 1)" : "none";
            let x = (offsetX + currentX / worldToPixelConst) * zoom - (elementSize.width / 2);
            let y = (offsetY - currentY / worldToPixelConst) * zoom - (elementSize.height / 2);
            const maxX = (baseSize * zoom) - elementSize.width, maxY = (baseSize * zoom) - elementSize.height;
            x = maxX < 0 ? maxX / 2 : Math.max(0, Math.min(x, maxX));
            y = maxY < 0 ? maxY / 2 : Math.max(0, Math.min(y, maxY));
            container.style.transform = `translate3d(${-x}px, ${-y}px, 0)`;
            scaler.style.transform = `scale(${zoom})`;
        }

        // Слежение за мышкой и расчет координат
        wrapper.addEventListener('mousemove', (e) => {
            const rect = wrapper.getBoundingClientRect();
            const localX = e.clientX - rect.left, localY = e.clientY - rect.top;

            // Получаем текущее смещение через матрицу (самый точный способ)
            const matrix = new WebKitCSSMatrix(window.getComputedStyle(container).transform);
            const gameX = ((Math.abs(matrix.m41) + localX) / zoom - offsetX) * worldToPixelConst;
            const gameY = (offsetY - (Math.abs(matrix.m42) + localY) / zoom) * worldToPixelConst;

            // Обновляем плашку под мышкой
            mouseInfo.style.display = 'block';
            mouseInfo.style.left = (e.clientX + 15) + 'px';
            mouseInfo.style.top = (e.clientY + 15) + 'px';
            mouseInfo.innerText = `X: ${gameX.toFixed(1)} Y: ${gameY.toFixed(1)}`;

            if (e.buttons === 1) {
                currentX -= (e.movementX * worldToPixelConst) / zoom;
                currentY += (e.movementY * worldToPixelConst) / zoom;
                updateMap(false);
            }
        });

        wrapper.addEventListener('mouseleave', () => mouseInfo.style.display = 'none');

        wrapper.addEventListener('wheel', (e) => {
            e.preventDefault();
            zoom = Math.max(0.2, Math.min(1.5, zoom + (e.deltaY > 0 ? -0.1 : 0.1)));
            updateMap(false);
        }, { passive: false });

        window.setTarget = function (x, y, smooth = true) {
            currentX = x; currentY = y;
            marker.style.display = 'block';
            marker.style.left = (offsetX + x / worldToPixelConst) + 'px';
            marker.style.top = (offsetY - y / worldToPixelConst) + 'px';
            updateMap(smooth);
        };

        function goToInputCoords() {
            const x = parseFloat(document.getElementById('in_x').value) || 0;
            const y = parseFloat(document.getElementById('in_y').value) || 0;
            window.setTarget(x, y, true);
        }

function renderZones(zones) {
    const layer = document.getElementById('zones-layer');
    
    // Пространство имен SVG (строго по стандарту)
    const svgNS = "http://www.w3.org";

    zones.forEach(zone => {
        if (!zone.Bounds) return;

        zone.Bounds.forEach(bound => {

            const rect = document.createElementNS(svgNS, "rect");

            const x = offsetX + (bound.Minimum.X / worldToPixelConst);
            const y = offsetY - (bound.Maximum.Y / worldToPixelConst);
            const width = (bound.Maximum.X - bound.Minimum.X) / worldToPixelConst;
            const height = (bound.Maximum.Y - bound.Minimum.Y) / worldToPixelConst;

            rect.setAttribute("x", x);
            rect.setAttribute("y", y);
            rect.setAttribute("width", width);
            rect.setAttribute("height", height);
            
            rect.style.fill = "rgba(251, 192, 45, 0.3)";
            rect.style.stroke = "#fbc02d";
            rect.style.strokeWidth = "2px";
            rect.style.vectorEffect = "non-scaling-stroke";
            rect.style.pointerEvents = "all";

            const title = document.createElementNS(svgNS, "title");
            title.textContent = zone.DisplayName || zone.Name;
            rect.appendChild(title);

            layer.appendChild(rect);
        });
    });
}

fetch('./zones.json')
    .then(response => response.json())
    .then(zones => {
        renderZones(zones);
    })
    .catch(err => console.error("Ошибка загрузки JSON:", err));
        
        window.addEventListener('resize', updateSize);
        updateSize();
    </script>
</body>

</html>
